<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Samuel Roldan - Iniciar Sesion</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Segoe UI",system-ui,sans-serif;
  background:linear-gradient(135deg,#0A2E6E 0%,#1565C0 60%,#0D47A1 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:#fff;border-radius:20px;width:100%;max-width:420px;
  box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;}
.top{padding:32px 28px 20px;text-align:center;
  background:linear-gradient(180deg,#F0F4FF,#fff);border-bottom:3px solid #1565C0;}
.top img{height:110px;width:auto;margin-bottom:14px;
  filter:drop-shadow(0 4px 12px rgba(21,101,192,.2));}
.top h1{color:#0D47A1;font-size:1.1rem;font-weight:800;margin-bottom:4px;}
.top p{color:#607D8B;font-size:.78rem;}
.body{padding:28px 32px 30px;}
.err{background:#FFEBEE;color:#C62828;border-radius:10px;
  padding:12px 15px;font-size:.82rem;margin-bottom:16px;border-left:4px solid #C62828;}
label{display:block;font-size:.79rem;font-weight:700;color:#37474F;margin-bottom:6px;}
input[type=text],input[type=password]{width:100%;padding:13px 15px;
  border:2px solid #E0E7EF;border-radius:10px;font-size:.9rem;
  outline:none;transition:all .2s;margin-bottom:16px;background:#F8FAFF;}
input:focus{border-color:#1565C0;background:#fff;box-shadow:0 0 0 4px rgba(21,101,192,.1);}
.btn{width:100%;background:linear-gradient(135deg,#1565C0,#0D47A1);color:#fff;
  border:none;padding:15px;border-radius:12px;font-size:1rem;font-weight:700;
  cursor:pointer;box-shadow:0 4px 15px rgba(21,101,192,.4);}
.btn:hover{opacity:.9;}
.pie{text-align:center;font-size:.65rem;color:#B0BEC5;margin-top:18px;}
</style>
</head>
